["Equipment Settings"]
	#Chance for mob to get a weapon.
	# Default: 0.18
	# Range: 0.0 ~ 1.0
	weaponChance = 0.12
	#Chance for item to receive 1 enchantment. (0.35 = 35%)
	# Default: 0.35
	# Range: 0.0 ~ 1.0
	enchantCountLevel1 = 0.20
	#Chance for item to receive 2 enchantments. (0.15 = 15%)
	# Default: 0.15
	# Range: 0.0 ~ 1.0
	enchantCountLevel2 = 0.10
	#Chance for item to receive 3 enchantments. (0.05 = 5%)
	# Default: 0.05
	# Range: 0.0 ~ 1.0
	enchantCountLevel3 = 0.05
	#Enchantments available for bows.
	availableBowEnchantments = ["minecraft:power", "minecraft:infinity", "minecraft:punch"]
	#Enchantments available for melee weapons.
	availableWeaponEnchantments = ["minecraft:sharpness", "minecraft:knockback"]
	#Enchantments available for armor.
	availableArmorEnchantments = ["minecraft:protection", "minecraft:unbreaking", "minecraft:fire_protection", "minecraft:projectile_protection"]

["Creeper Speed Settings"]
	#Multiplier to increase Creeper movement speed.
	# Default: 1.4
	# Range: 1.0 ~ 5.0
	creeperSpeedMultiplier = 1.15

["Spider Speed Settings"]
	#Multiplier to increase Spider movement speed.
	# Default: 1.25
	# Range: 1.0 ~ 5.0
	spiderSpeedMultiplier = 1.2
